<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전농15 · 정비사업 현황 대시보드</title>
<meta name="description" content="전농15구역 재개발(신속통합기획) 진행현황·일정·고시공고·FAQ를 한 화면에서 제공하는 정비사업 현황 대시보드.">
<meta property="og:title" content="전농15 · 정비사업 현황 대시보드">
<meta property="og:description" content="전농15구역 재개발 진행현황·소유자 TO-DO·고시공고·FAQ 대시보드">
<meta property="og:type" content="website">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<style>
:root{
 --bg0:#0A0F1F; --card:#161C32; --card2:#1C2340;
 --bd:rgba(255,255,255,.09); --bd2:rgba(255,255,255,.055);
 --t1:#F2F4FC; --t2:#C6CDE2; --t3:#9BA5C0;
 --acc:#6E8BFF; --acc-t:#AEC0FF; --accg:linear-gradient(135deg,#5B86F0,#9B7BFF);
 --acc-weak:rgba(110,139,255,.16);
 --red:#FF6B82; --red-t:#FF98A8; --red-weak:rgba(255,107,130,.16);
 --teal:#34D399;
 /* 라이트(라벤더 톤) 서브블록 */
 --w-bg:#EBEEF9; --w-bd:#D9DEF1; --w-t1:#27324A; --w-t2:#3F4A66; --w-t3:#697192; --w-acc:#3550C8;
 --r:20px; --sh:0 10px 30px rgba(5,8,22,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Pretendard Variable',-apple-system,'Apple SD Gothic Neo',system-ui,sans-serif;
 color:var(--t1);font-size:17px;line-height:1.62;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;
 background:var(--bg0);
 background-image:radial-gradient(1000px 540px at 86% -10%,rgba(124,108,255,.22),transparent 60%),
                  radial-gradient(880px 460px at -12% 2%,rgba(59,130,246,.16),transparent 60%);
 background-attachment:fixed;min-height:100vh}
a{color:var(--acc-t);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.demo-banner{background:rgba(255,176,32,.10);color:#F4C56B;font-size:14px;text-align:center;padding:8px 12px;border-bottom:1px solid var(--bd2)}
header{position:sticky;top:0;z-index:40;background:rgba(11,15,30,.62);backdrop-filter:blur(14px);
 border-bottom:1px solid var(--bd2);padding:16px 22px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:baseline;gap:10px}
.logo .nm{font-size:24px;font-weight:800;letter-spacing:-.04em;color:var(--t1)}
.logo .nm b{background:var(--accg);-webkit-background-clip:text;background-clip:text;color:transparent}
.logo .sub{font-weight:600;font-size:15px;color:var(--t3);letter-spacing:-.01em}
.wrap{max-width:920px;margin:0 auto;padding:26px 22px 64px}

/* hero */
.dhead{position:relative;border-radius:var(--r);padding:26px;margin-bottom:16px;overflow:hidden;
 background:linear-gradient(135deg,rgba(91,134,240,.26),rgba(155,123,255,.18)),var(--card2);
 border:1px solid var(--bd);box-shadow:var(--sh)}
.dhead::after{content:"";position:absolute;top:-40px;right:-30px;width:200px;height:200px;border-radius:50%;
 background:radial-gradient(circle,rgba(155,123,255,.35),transparent 65%);pointer-events:none}
.dhead h1{font-size:29px;font-weight:800;letter-spacing:-.03em;color:#fff;position:relative}
.dhead .loc{font-size:16px;color:var(--t2);margin-top:5px;position:relative}
.badges{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap;position:relative}
.badge{font-size:14px;font-weight:700;padding:6px 14px;border-radius:999px;border:1px solid transparent}
.b-type{background:var(--acc-weak);color:var(--acc-t);border-color:rgba(110,139,255,.34)}
.b-stage{background:var(--red-weak);color:var(--red-t);border-color:rgba(255,107,130,.34)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:10px;margin-top:22px;position:relative}
.stat{background:rgba(255,255,255,.06);border:1px solid var(--bd2);border-radius:14px;padding:14px 15px;backdrop-filter:blur(4px)}
.stat .v{font-size:21px;font-weight:800;letter-spacing:-.02em;color:#fff}
.stat .l{font-size:14px;color:var(--t2);margin-top:4px;font-weight:500}

/* 소유자 TODO 강조 블록 */
.todo-block{border:1px solid rgba(110,139,255,.4)!important;background-image:linear-gradient(180deg,rgba(110,139,255,.12),transparent 55%);margin-bottom:16px}

/* tabs */
.tabs{display:flex;gap:7px;margin:18px 2px 16px;flex-wrap:wrap}
.tab{padding:12px 22px;border-radius:999px;font-weight:700;font-size:16.5px;color:var(--t1);background:rgba(255,255,255,.08);border:1px solid var(--bd);transition:.15s}
.tab:hover{color:var(--t1);background:rgba(255,255,255,.09)}
.tab.on{color:#fff;background:var(--accg);border-color:transparent;box-shadow:0 8px 22px rgba(110,139,255,.5)}
.cards2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.box{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:22px;box-shadow:var(--sh);
 background-image:linear-gradient(180deg,rgba(255,255,255,.045),transparent 40%)}
.box h4{font-size:17px;font-weight:700;margin-bottom:15px;display:flex;align-items:center;gap:7px;color:var(--t1);flex-wrap:wrap}
.box h4.bigh{font-size:21px;font-weight:800;letter-spacing:-.02em}
.box h4 .src{margin-left:auto;font-size:13px;color:var(--t3);font-weight:500}
.row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd2);font-size:16px;color:var(--t2)}
.row:last-child{border:none}.row b{color:var(--t1);font-weight:700}

/* timeline */
.tl{list-style:none;position:relative;padding-left:6px}
.tl li{position:relative;padding:0 0 26px 30px;border-left:2px solid rgba(255,255,255,.12)}
.tl li:last-child{border-left-color:transparent;padding-bottom:0}
.tl li .dot{position:absolute;left:-8px;top:1px;width:15px;height:15px;border-radius:50%;background:var(--card);border:2.5px solid rgba(255,255,255,.18);z-index:2}
.tl li.done .dot{background:var(--acc);border-color:var(--acc)}
.tl li.now .dot{background:var(--acc);border-color:var(--acc);box-shadow:0 0 0 5px var(--acc-weak)}
.stagebtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:0;cursor:pointer}
.stagebtn .t{font-weight:700;font-size:18px;color:var(--t1)}
.stagebtn .d{font-size:15px;color:var(--t2)}
.stagebtn .chev{margin-left:auto;color:var(--acc-t);font-size:15px;font-weight:700}
.stagebtn:hover .t{color:var(--acc-t)}
.tl li.now .stagebtn .d{color:var(--acc-t);font-weight:700}
.tl li.todo .stagebtn .t{color:var(--t3);font-weight:600}
.tl li.todo .stagebtn .chev{color:var(--t3)}
.stagedetail{margin-top:10px}

/* === 라이트 서브블록(일정 블록) — 타임라인 막대 위로, 폰트 통일 === */
.stagesub{position:relative;z-index:1;background:var(--w-bg);border:1px solid var(--w-bd);border-radius:14px;padding:14px 16px;box-shadow:0 4px 14px rgba(5,8,22,.22)}
.tl .stagesub{margin-left:-24px}
.stagesub .ssub-h{font-size:13px;font-weight:700;color:var(--w-t3);margin-bottom:10px;letter-spacing:.02em}
.evrow{display:flex;gap:11px;padding:6px 0;font-size:15px;color:var(--w-t2);font-weight:500;align-items:baseline}
.evrow .ed{color:var(--w-acc);font-weight:700;min-width:100px;font-size:15px}
.schd{width:100%;border-collapse:collapse}
.schd td{padding:11px 6px;vertical-align:middle;font-size:15px;color:var(--w-t2);font-weight:500;border-bottom:1px solid var(--w-bd)}
.schd tr:last-child td{border:none}
.schd td.dt{white-space:nowrap;width:140px;color:var(--w-acc);font-weight:700;font-size:15px}
.nn-w{font-size:13.5px;color:var(--w-t3);margin-top:3px;font-weight:500}
.time-note{font-size:13px;color:var(--w-t3);font-weight:500;margin-top:4px}
.dt-time{display:none}
.st{font-size:13px;font-weight:700;padding:4px 10px;border-radius:7px;white-space:nowrap;margin-left:6px}
.st.done{background:#E3ECFD;color:#2563EB}
.st.now{background:#FCE4EA;color:#D6336C}
.st.todo{background:#E7EAF3;color:#7C879F}
.dday{display:inline-block;font-size:13px;font-weight:800;padding:3px 9px;border-radius:7px;background:#E3ECFD;color:#2563EB;margin-right:0;letter-spacing:.02em}
.dday.urgent{background:#FCE4EA;color:#D6336C}

/* notices */
.pin{background:var(--acc-weak);border:1px solid rgba(110,139,255,.36);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.pin .pinlbl{font-size:13px;font-weight:800;color:var(--acc-t);letter-spacing:.03em;margin-bottom:6px}
.notice{display:flex;gap:12px;padding:14px 2px;border-bottom:1px solid var(--bd2)}
.notice:last-child{border:none}
.nt{font-size:13px;font-weight:700;color:#fff;background:var(--acc);border-radius:7px;padding:3px 9px;height:fit-content;white-space:nowrap}
.nt.gosi{background:var(--red)}.nt.gyul{background:var(--teal);color:#06281C}.nt.gyeong{background:rgba(255,255,255,.16)}.nt.news{background:rgba(255,255,255,.16)}
.notice .ti{font-weight:600;font-size:17px;color:var(--t1);line-height:1.5}
.notice .ti:hover{color:var(--acc-t)}
.notice .mt{font-size:14px;color:var(--t2);margin-top:6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.srcpill{font-size:13px;color:var(--acc-t);background:var(--acc-weak);border:1px solid rgba(110,139,255,.3);padding:2px 8px;border-radius:6px;font-weight:600}
.emptynote{font-size:15px;color:var(--t2);background:rgba(255,255,255,.04);border:1px solid var(--bd2);border-radius:12px;padding:13px 15px;margin-top:14px;line-height:1.6}

/* newsletter album */
.uploader{display:inline-flex;align-items:center;gap:7px;padding:11px 18px;border-radius:12px;background:var(--accg);
 color:#fff;font-weight:700;font-size:16px;margin-bottom:16px;box-shadow:0 6px 16px rgba(110,139,255,.38);transition:.15s}
.uploader:hover{filter:brightness(1.08)}
.album-main{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--bd);box-shadow:var(--sh)}
.album-main img{width:100%;max-height:440px;object-fit:cover;display:block;cursor:zoom-in}
.album-cap{position:absolute;left:0;right:0;bottom:0;padding:14px 16px;font-size:14px;color:#EAEFFF;font-weight:600;
 background:linear-gradient(transparent,rgba(0,0,0,.7))}
.album-strip{display:flex;gap:10px;margin-top:12px;overflow-x:auto;padding-bottom:4px}
.album-thumb{position:relative;flex:0 0 86px;height:86px;border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:.15s}
.album-thumb.sel{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-weak)}
.album-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.nl-del{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);
 color:#fff;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
.nl-del:hover{background:var(--red)}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:90;display:flex;align-items:center;justify-content:center;padding:30px;cursor:zoom-out}
.lb-box{max-width:760px;max-height:92vh;display:flex;flex-direction:column;gap:12px}
.lb-box img{max-width:100%;max-height:72vh;object-fit:contain;border-radius:10px}
.lb-cap{background:#fff;color:#33415C;padding:13px 16px;border-radius:12px;font-size:14px;line-height:1.6;white-space:pre-wrap;max-height:22vh;overflow:auto}
footer{text-align:center;color:var(--t2);font-size:13.5px;padding:28px 20px;line-height:1.8;border-top:1px solid var(--bd2);margin-top:20px}
footer .ft-mail{margin-top:10px;color:var(--t2)}

/* ===== 추진 주체·문의 — 라벨 한 줄 고정, 값 우측 정렬 ===== */
.contact .row{align-items:baseline}
.contact .row span{white-space:nowrap;flex:0 0 auto}
.contact .row b{flex:1;min-width:0;text-align:right;padding-left:16px}

/* ===== FAQ ===== */
.faq-search{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--bd);background:rgba(255,255,255,.06);
 color:var(--t1);font-size:15.5px;font-family:inherit;margin-bottom:14px}
.faq-search::placeholder{color:var(--t3)}
.faq-search:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-weak)}
.faq-list{display:flex;flex-direction:column;gap:10px}
.faq-item{border:1px solid var(--bd);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.03)}
.faq-item.open{border-color:rgba(110,139,255,.4)}
.faq-q{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:15px 16px;font-size:16px;font-weight:700;color:var(--t1)}
.faq-q .qtext{flex:1}
.faq-q:hover{color:var(--acc-t)}
.faq-ic{font-size:21px;font-weight:700;color:var(--acc-t);line-height:1;width:18px;text-align:center}
.faq-a{padding:0 16px 16px;color:var(--t2);font-size:15.5px;line-height:1.65}
.faq-a p{margin:0 0 8px}.faq-a p:last-child{margin:0}
.faq-img{max-width:100%;border-radius:10px;margin:8px 0;display:block}

/* ===== 한글 단어단위 줄바꿈(글자 낱개 쪼개짐 방지) ===== */
.row,.notice .ti,.schd td,.evrow,.faq-q .qtext,.faq-a,.nn-w,.stagebtn .t{word-break:keep-all;overflow-wrap:anywhere}

/* ===== 모바일 반응형 ===== */
@media (max-width:600px){
  body{font-size:16px}
  .wrap{padding:18px 13px 48px}
  header{padding:14px 16px}
  .dhead{padding:20px 17px}
  .dhead h1{font-size:23px}
  .dhead .loc{font-size:14px}
  .box{padding:17px 15px}
  .box h4{font-size:16px}
  .box h4.bigh{font-size:19px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .tabs{gap:6px}
  .tab{padding:10px 15px;font-size:15px}
  .tl li{padding-left:26px}
  .tl .stagesub{margin-left:-18px}
  /* 표를 세로 스택으로 → 좁은 화면에서 글자 세로 깨짐 방지 */
  .schd,.schd tbody,.schd tr,.schd td{display:block;width:auto}
  .schd tr{padding:11px 0;border-bottom:1px solid var(--w-bd)}
  .schd tr:last-child{border:none}
  .schd td{border:none!important;padding:2px 0}
  .schd td.dt{font-size:14px;margin-bottom:2px;width:auto}
  .schd td[style*="right"]{text-align:left!important}
  .schd td[style*="right"] .dday{margin-top:5px}
  .schd td[style*="right"] .time-note{display:none}
  .schd td.dt .dt-time{display:inline;margin-left:8px;font-size:13px;font-weight:500;color:var(--w-t3)}
  .evrow{flex-direction:column;gap:2px}
  .evrow .ed{min-width:0}
  .contact .row b{font-size:14px}
}
</style>
</head>

<header>

<div class="wrap">

   stageEvents:{

     {step:"선거 당선자 공고", date:"2026.08.10", start:"2026-08-10", end:"2026-08-10"},

   ],
   /* 소유자 TODO — due=마감일. 전 항목 마감 경과 시 상단 블록 자동 비표시 */

/* ===== STATE ===== */
const $=s=>document.querySelector(s);
const get=id=>REGIONS.find(r=>r.id===id);
let tab="진행현황";
let faqQuery="";
const faqOpen=new Set();

function fmtDate(d){ if(!d) return ""; d=String(d).trim().replace(/[-/]/g,".").replace(/\.+$/,""); return d; }
function cleanText(t){ return String(t).replace(/\s*[\(（]\s*\d{1,2}\s*\/\s*\d{1,2}\s*[\)）]\s*$/,"").trim(); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function schedStatus(it){ const T=todayISO();
  if(it.end && it.end < T) return "done";
  if(it.start && it.start <= T && (!it.end || T <= it.end)) return "now";
  return "todo"; }
/* D-day는 '마감일(end/due)' 기준 */
function dday(iso){ if(!iso) return null;
  const t=new Date(todayISO()+"T00:00:00"), d=new Date(iso+"T00:00:00");
  return Math.round((d-t)/86400000); }
function ddayBadge(iso){ const n=dday(iso); if(n===null||n<0) return "";
  if(n===0) return `<span class="dday urgent">D-DAY</span>`;
  return `<span class="dday ${n<=7?"urgent":""}">D-${n}</span>`; }
function toggleStage(i){ const d=document.getElementById("sd-"+i); if(!d) return;
  const open=d.style.display!=="none"; d.style.display=open?"none":"block";
  const c=document.getElementById("chev-"+i); if(c) c.textContent=open?"▸":"▾"; }

/* 추진 주체·문의 (진행현황 맨 아래) */
function contactBox(r){ return `<div class="box contact" style="margin-top:14px"><h4>추진 주체 · 문의</h4>
    <div class="row"><span>추진주체</span><b>${r.contact.body}</b></div>
    <div class="row"><span>준비위원장</span><b>${r.contact.head}</b></div>
    <div class="row"><span>사무실</span><b>${r.contact.office}</b></div>
    <div class="row"><span>연락처</span><b>${r.contact.tel}</b></div>
    <div class="row"><span>네이버 카페</span><b><a href="${r.contact.cafe}" target="_blank" rel="noopener">cafe.naver.com/jeonnong15 ↗</a></b></div></div>`; }

/* 소유자 TO-DO Checklist (상단) — 진행현황 일정 규격(좌:일정 / 우:D-day). 전 항목 마감 경과 시 비표시 */
function ownerTodoBlock(r){
  const T=todayISO();
  const active=r.residentTodos.filter(t=>!t.due || t.due>=T);
  if(!active.length) return "";
  const rows=active.map(t=>`<tr><td class="dt">${fmtDate(t.d)}${t.time?`<span class="dt-time">${t.time}</span>`:""}</td><td><b style="color:var(--w-t1)">${cleanText(t.t)}</b><div class="nn-w">${t.note}</div></td><td style="text-align:right;white-space:nowrap">${t.firm===false?"":ddayBadge(t.due)}${t.time?`<div class="time-note">${t.time}</div>`:""}</td></tr>`).join("");
  return `<div class="box todo-block"><h4 class="bigh">소유자 TO-DO Checklist</h4>
    <div class="stagesub"><table class="schd">${rows}</table></div></div>`;
}

/* ===== RENDER ===== */
function renderDash(){
  const r=get(CURRENT_ID);
  $("#dash").innerHTML=`
   <div class="dhead">
     <h1>${r.name} <span style="font-size:16px;font-weight:600;color:var(--t2);letter-spacing:-.01em">전농동 152-65번지 일대</span></h1>
     <div class="loc">${r.gu} · ${r.dong} · 권리산정기준일 ${r.baseDate}</div>
     <div class="badges"><span class="badge b-type">${r.type}</span><span class="badge b-stage">${r.stageLabel}</span></div>
     <div class="stats">
       <div class="stat"><div class="v">${r.stageLabel}</div><div class="l">진행단계</div></div>
       <div class="stat"><div class="v">${r.aged.now}%</div><div class="l">노후도(현재)</div></div>
       <div class="stat"><div class="v">${r.owners.toLocaleString()}명</div><div class="l">토지등소유자</div></div>
       <div class="stat"><div class="v">${(r.area/10000).toFixed(1)}만㎡</div><div class="l">구역면적</div></div>
       <div class="stat"><div class="v">${r.units.total.toLocaleString()}</div><div class="l">전체 세대수</div></div>
     </div>
   </div>
   ${ownerTodoBlock(r)}
   <div class="tabs">${["진행현황","개요","고시·공고","FAQ"].map(t=>`<button class="tab ${t===tab?'on':''}" onclick="setTab('${t}')">${t}</button>`).join("")}</div>
   <div id="pane"></div>`;
  renderPane();
}
function setTab(t){ tab=t; document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.textContent.trim()===t)); renderPane(); }

function renderPane(){
  const r=get(CURRENT_ID); let h="";

  if(tab==="진행현황"){
    const SE=r.stageEvents||{};
    const stageDetail=(name)=>{
      if(name==="추진위원회 승인"){
        const rows=r.prepSchedule.map(s=>{const st=schedStatus(s);return `<tr><td class="dt">${s.date}</td><td>${s.step}</td><td style="text-align:right;white-space:nowrap">${s.firm===false?"":ddayBadge(s.end)}<span class="st ${st}">${st==="done"?"완료":st==="now"?"진행":"예정"}</span></td></tr>`;}).join("");
        return `<div class="stagesub"><div class="ssub-h">추진위원회 구성 일정</div><table class="schd">${rows}</table></div>`;
      }
      const evs=SE[name];
      if(evs&&evs.length) return `<div class="stagesub"><div class="ssub-h">구역 자체 종합일정</div>${evs.map(e=>`<div class="evrow"><span class="ed">${fmtDate(e.d)}</span><span>${cleanText(e.t)}</span></div>`).join("")}</div>`;
      return `<div class="stagesub"><div class="ssub-h" style="margin:0">등록된 세부 일정이 없습니다.</div></div>`;
    };
    const hasDetail=(name)=> name==="추진위원회 승인" || (SE[name]&&SE[name].length);
    h=`<div class="box"><h4 class="bigh">진행현황 타임라인 <span class="src">단계 클릭 시 세부일정</span></h4>
       <ul class="tl">${r.timeline.map((t,i)=>{
          const cls=t[2]==="done"?"done":t[3]==="now"?"now":"todo";
          const dtxt = t[1] || (cls==="now"?"준비 중":"예정");
          const open = cls==="now" && hasDetail(t[0]);
          return `<li class="${cls}"><span class="dot"></span>
            <button class="stagebtn" onclick="toggleStage(${i})"><span class="t">${t[0]}</span><span class="d">${dtxt}</span><span class="chev" id="chev-${i}">${open?"▾":"▸"}</span></button>
            <div class="stagedetail" id="sd-${i}" style="display:${open?"block":"none"}">${stageDetail(t[0])}</div></li>`;
       }).join("")}</ul></div>`;
    h+=contactBox(r);
  }

  else if(tab==="개요"){
    h=`<div class="cards2">
      <div class="box"><h4>기본 정보</h4>
        <div class="row"><span>구역면적</span><b>${r.area.toLocaleString()} ㎡</b></div>
        <div class="row"><span>토지등소유자</span><b>${r.owners.toLocaleString()} 명</b></div>
        <div class="row"><span>권리산정기준일</span><b>${r.baseDate}</b></div>
        <div class="row"><span>사업종류</span><b>${r.type}</b></div></div>
      <div class="box"><h4>세대 현황</h4>
        <div class="row"><span>전체 세대수</span><b>${r.units.total.toLocaleString()}</b></div>
        <div class="row"><span>공동주택</span><b>${r.units.multi.toLocaleString()} (${Math.round(r.units.multi/r.units.total*100)}%)</b></div>
        <div class="row"><span>단독주택</span><b>${r.units.single.toLocaleString()} (${Math.round(r.units.single/r.units.total*100)}%)</b></div></div>
      <div class="box"><h4>노후도 (30년 기준)</h4>
        <div class="row"><span>현재</span><b>${r.aged.now}%</b></div>
        <div class="row"><span>5년 후</span><b>${r.aged.y5}%</b></div>
        <div class="row"><span>10년 후</span><b>${r.aged.y10}%</b></div></div>
      <div class="box"><h4>개발 여건</h4>
        <div class="row"><span>접도율</span><b>${r.road}%</b></div>
        <div class="row"><span>과소필지</span><b>${r.smallLot}%</b></div>
        <div class="row"><span>반지하 비율</span><b>${r.semiBase}%</b></div></div>
    </div>`;
  }

  else if(tab==="고시·공고"){
    const byDate=(a,b)=>(b.date||"0000-00-00").localeCompare(a.date||"0000-00-00");
    const pinned=r.notices.filter(n=>n.cat==="공지").sort(byDate)[0]||null;
    const rest=r.notices.filter(n=>n!==pinned).sort(byDate);
    const tagCls=c=>c==="고시"?"gosi":c==="결재"?"gyul":c==="경과"?"gyeong":c==="뉴스"?"news":"";
    const rowHtml=n=>`<div class="notice"><span class="nt ${tagCls(n.cat)}">${n.cat}</span><div style="flex:1">
        <a class="ti" href="${n.url}" target="_blank" rel="noopener">${n.title}</a>
        <div class="mt">${n.date?`<span>${n.date}</span>·`:''}<span>${n.by}</span>${n.real?'<span class="srcpill">원문 ↗</span>':''}</div></div></div>`;
    h=`<div class="box"><h4>고시 · 공고 · 결재</h4>`;
    if(pinned){ h+=`<div class="pin"><div class="pinlbl">📌 최신 공지 고정</div>${rowHtml(pinned)}</div>`; }
    h+=rest.map(rowHtml).join("");
    h+=`</div>`;
  }

  else if(tab==="FAQ"){
    h=`<div class="box"><h4 class="bigh">자주 묻는 질문 (FAQ)</h4>
       <input id="faqSearch" class="faq-search" type="text" placeholder="궁금한 키워드를 검색하세요" value="${(faqQuery||'').replace(/"/g,'&quot;')}" oninput="faqQuery=this.value;renderFaqList()">
       <div class="faq-list" id="faqList"></div></div>`;
  }

  $("#pane").innerHTML=h;
  if(tab==="FAQ") renderFaqList();
}

/* ===== FAQ ===== */
function faqText(f){ return (f.q+" "+f.a.filter(x=>x.type==="text").map(x=>x.value).join(" ")); }
function faqAnswer(a){ return a.map(x=> x.type==="img"
    ? `<img class="faq-img" src="${x.src}" alt="첨부 이미지">`
    : `<p>${x.value}</p>`).join(""); }
function toggleFaq(gi){ if(faqOpen.has(gi)) faqOpen.delete(gi); else faqOpen.add(gi); renderFaqList(); }
function renderFaqList(){
  const box=document.getElementById("faqList"); if(!box) return;
  const kw=(faqQuery||"").trim().toLowerCase();
  const list=FAQ.filter(f=>!kw || faqText(f).toLowerCase().includes(kw));
  if(!list.length){ box.innerHTML=`<div class="emptynote" style="margin:2px 0 0">검색 결과가 없습니다.</div>`; return; }
  box.innerHTML=list.map(f=>{ const gi=FAQ.indexOf(f); const open=faqOpen.has(gi);
    return `<div class="faq-item ${open?'open':''}">
      <button class="faq-q" onclick="toggleFaq(${gi})"><span class="qtext">${f.q}</span><span class="faq-ic">${open?'−':'+'}</span></button>
      <div class="faq-a" style="display:${open?'block':'none'}">${faqAnswer(f.a)}</div>
    </div>`;}).join("");
}

/* ===== INIT — data.json(고시/공고) 있으면 덮어쓰고 렌더. 없으면 내장 데이터로 동작 ===== */
async function boot(){
  try{
    const res=await fetch("data.json?_="+Date.now(), {cache:"no-store"});
    if(res.ok){ const d=await res.json();
      if(d && Array.isArray(d.notices) && d.notices.length) REGIONS[0].notices=d.notices; }
  }catch(e){ /* 로컬 file:// 등에서는 내장 데이터 사용 */ }
  renderDash();
}
boot();
